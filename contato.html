<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato | Guilherme Dias</title>
  <link rel="stylesheet" href="./style.css">
  <meta name="description" content="Entre em contato com Guilherme Dias.">
</head>
<body>

  <div id="particles-js"></div>

  <main class="container">

    <header class="perfil">
      <img src="./assets/avatar.png" alt="Avatar" class="avatar">

      <div class="perfil__texto">
        <h1>Guilherme Dias</h1>
        <p>Dev em evolução</p>
      </div>
    </header>

    <section class="links">

      <h2>Entre em Contato</h2>

      <form class="formulario">

        <input 
          type="text" 
          placeholder="Seu nome"
          required
        >

        <input 
          type="email" 
          placeholder="Seu e-mail"
          required
        >

        <textarea 
          placeholder="Sua mensagem"
          rows="5"
          required
        ></textarea>

        <button type="submit" class="link">
          Enviar Mensagem
        </button>

      </form>

      <a href="./index.html" class="link">
        Voltar
      </a>

    </section>



  <footer class="rodape">
<a href="./index.html" class="nav-link">Voltar para Links</a>
<p>&copy; 2026 | Desenvolvido por Guilherme Dias</p>
</footer>


  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

  <script>
    particlesJS("particles-js", {
      particles: {
        number: { value: 100 },
        color: { value: "#00ff99" },
        size: { value: 2, random: true },
        line_linked: {
          enable: true,
          distance: 120,
          color: "#00ff99",
          opacity: 0.4
        },
        move: {
          speed: 1.5,
          random: true
        }
      },
      interactivity: {
        detect_on: "canvas",
        events: {
          onhover: {
            enable: true,
            mode: "grab"
          },
          onclick: {
            enable: true,
            mode: "push"
          }
        },
        modes: {
          grab: {
            distance: 150,
            line_linked: { opacity: 1 }
          },
          push: {
            particles_nb: 5
          }
        }
      }
    });
  </script>

</body>
</html>
