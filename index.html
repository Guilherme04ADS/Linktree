<body>

  <main class="container">

    <header class="perfil">
      <img src="./assets/avatar.png" alt="Avatar" class="avatar">
      <div class="perfil__texto">

    </header>
    
    <section class="links">
      <ul>
        <li><a href="https://github.com/Guilherme04ADS" class="link">GitHub</a></li>

  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

  <script>
    particlesJS("particles-js", {
      particles: {
        number: { value: 100 },
        color: { value: "#00ff99" },
        size: { value: 2, random: true },
        line_linked: {
          enable: true,
          distance: 120,
          color: "#00ff99",
          opacity: 0.4
        },
        move: {
          speed: 1.5,
          random: true
        }
      },
      interactivity: {
        detect_on: "canvas",
        events: {
          onhover: {
            enable: true,
            mode: "grab"
          },
          onclick: {
            enable: true,
            mode: "push"
          }
        },
        modes: {
          grab: {
            distance: 150,
            line_linked: { opacity: 1 }
          },
          push: {
            particles_nb: 5
          }
        }
      }
    });
  </script>
